name: Morocco Website Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes automatically
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run website monitor
        run: python advanced_monitor.py

      - name: Commit results back to repository
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add cloud_results/
          git diff --staged --quiet || git commit -m "📊 Auto monitoring results $(date '+%Y-%m-%d %H:%M:%S')"
          git push